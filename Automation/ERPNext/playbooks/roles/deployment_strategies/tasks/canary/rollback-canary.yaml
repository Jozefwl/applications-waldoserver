# ================ WEIGHTED ROUND ROBIN ====================
- name: Create TraefikService for weighted routing
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: TraefikService
      metadata:
        name: frappe-bench-weighted
        namespace: "{{ kubernetes_namespace }}"
      spec:
        weighted:
          services:
            - name: "{{ helm_release_name }}-{{ kubernetes_namespace }}"
              port: 8080
              weight: 10  

# =============== MAKE PRODUCTION INGRESSROUTE =================
- name: Create IngressRoute for production
  kubernetes.core.k8s:
    state: present
    kubeconfig: "{{ kubeconfig }}"
    definition:
      apiVersion: traefik.io/v1alpha1
      kind: IngressRoute
      metadata:
        name: frappe-bench-erpnext
        namespace: "{{ kubernetes_namespace }}"
      spec:
        entryPoints:
          - websecure
        routes:
          - match: Host(`tenant1.erp.waldhauser.sk`) || Host(`tenant2.erp.waldhauser.sk`) || Host(`tenant3.erp.waldhauser.sk`)
          # Alternative for production use would be regex or ansible loop to make a variable for all these tenants...
            kind: Rule
            services:
              - name: frappe-bench-weighted
                kind: TraefikService
        tls:
          secretName: erpnext-tls

- name: Set ansible facts for old blocking syncjob deletion
  ansible.builtin.set_fact:
    source_release: "{{ helm_release_name }}"
    dest_release: "{{ helm_release_name }}-canary-{{ kubernetes_namespace }}"

- name: Delete old sync job blocking PVC
  kubernetes.core.k8s:
    state: absent
    kind: Job
    name: "sync-{{ source_release | regex_replace('-', '') }}-to-{{ dest_release | regex_replace('-', '') }}"
    namespace: "{{ kubernetes_namespace }}"
    kubeconfig: "{{ kubeconfig }}"
  ignore_errors: yes


# ============ ROLLBACK CANARY =================
- name: Remove canary release
  kubernetes.core.helm:
    name: "{{ helm_release_name }}-canary"
    kubeconfig_path: "{{ kubeconfig }}"
    release_namespace: "{{ kubernetes_namespace }}"
    state: absent
    wait: true
    wait_timeout: 600s
    purge: true

# ============ STOP PLAYBOOK HERE =================
- name: Stop playbook execution
  meta: end_play