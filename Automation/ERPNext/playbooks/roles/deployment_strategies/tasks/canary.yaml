---
- name: Canary Deployment Strategy
  block:
    - name: Display strategy info
      debug:
        msg: |
          CANARY STRATEGY deployment
          image tag: {{ new_erpnext_image_tag }}
          base release: {{ helm_release_name }}
          canary release: {{ helm_release_name }}-canary
          namespace: {{ kubernetes_namespace }}
          chart: {{ helm_chart_path }}
          traffic split: 10% canary / 90% stable

    # ==================== LOAD BASE VALUES ====================
    - name: Load existing Helm values
      ansible.builtin.slurp:
        src: "{{ helm_chart_path }}/values.yaml"
      register: helmchart_values_raw

    - name: Parse existing values into a fact
      ansible.builtin.set_fact:
        existing_helm_values: "{{ helmchart_values_raw.content | b64decode | from_yaml }}"

    # ==================== DEPLOY CANARY ====================
    - name: Define canary helm values patch
      ansible.builtin.set_fact:
        canary_helm_patch:
          jobs:
            createSite: # dont run lengthy job when we copy files anyway
              enabled: false
          image:
            tag: "{{ new_erpnext_image_tag }}"
          replicaCount: 1  # deploy a single replica during initial canary install
          ingress:
            enabled: false  # disable ingress creation to not route to canary

    - name: Merge canary values with existing values
      ansible.builtin.set_fact:
        helm_values: "{{ existing_helm_values | combine(canary_helm_patch, recursive=True) }}"

    # ==================== ROLLBACK CANARY IF TAG IS SET ====================
    - name: Rollback canary when tag is set 
      include_tasks: canary/rollback-canary.yaml
      when: canary_rollback | bool
      ignore_errors: True

    # ==================== APPLY HELM RELEASE ====================
    - name: Deploy canary release
      kubernetes.core.helm:
        name: "{{ helm_release_name }}-canary"
        kubeconfig_path: "{{ kubeconfig }}"
        chart_ref: "{{ helm_chart_path }}"
        release_namespace: "{{ kubernetes_namespace }}"
        values: "{{ helm_values }}"
        state: present
        wait: true
        wait_timeout: 600s
        atomic: true
      register: canary_helm_release

    # ==================== WAIT FOR JOBS ====================
    - name: Wait for all jobs to complete
      ansible.builtin.include_tasks: shared/wait-for-jobs.yaml

    # ==================== SYNCHRONIZE PVCs ====================
    - name: Sync PVC from stable to canary
      ansible.builtin.include_tasks: shared/sync-pvc.yaml
      vars:
        source_release: "{{ helm_release_name }}"
        dest_release: "{{ helm_release_name }}-canary-{{ kubernetes_namespace }}"

    # ==================== CREATE CANARY ROUTING ====================
    - name: Create canary routing
      ansible.builtin.include_tasks: canary/create-canary-routing.yaml

    # ==================== HEALTHCHECK ====================
    - name: Healthcheck first tenant
      ansible.builtin.include_tasks: shared/healthcheck-first-tenant.yaml