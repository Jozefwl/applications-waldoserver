---
# apiVersion: v1
# kind: ConfigMap
# metadata:
#   name: erp-site-html
#   namespace: apps
# data:
#    index.html: |
#       ...

# NEW ! please apply configmap directly from file by using command:
#
# WITHOUT RESTARTING:
# kubectl create configmap erp-site-html --from-file=index.html=indexERP.html -n apps --dry-run=client -o yaml | kubectl apply -f -
#
# WITH RESTARTING:
# kubectl create configmap erp-site-html --from-file=index.html=indexERP.html -n apps --dry-run=client -o yaml | kubectl apply -f - && kubectl rollout restart deployment/erp-site-deployment -n apps

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: erp-site-deployment
  namespace: apps
  labels:
    app: erp-site
spec:
  replicas: 2
  selector:
    matchLabels:
      app: erp-site
  template:
    metadata:
      labels:
        app: erp-site
    spec:
      containers:
        - name: static-http
          image: httpd:2.4-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            # Mount the ConfigMap index.html over the default doc root index.html
            - name: site-content
              mountPath: /usr/local/apache2/htdocs/index.html
              subPath: index.html
      volumes:
        - name: site-content
          configMap:
            name: erp-site-html
            items:
              - key: index.html
                path: index.html
---
apiVersion: v1
kind: Service
metadata:
  name: erp-site-svc
  namespace: apps
  labels:
    app: erp-site
spec:
  type: ClusterIP
  selector:
    app: erp-site
  ports:
    - name: http
      port: 80
      targetPort: 80
---
# Certificate using letsencrypt
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: erp-waldhauser-cert
  namespace: apps
spec:
  secretName: erp-waldhauser-cert 
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: erp.waldhauser.sk
  dnsNames:
    - erp.waldhauser.sk
---
# Traefik-friendly Ingress (networking.k8s.io/v1)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: erp-site-ingress
  namespace: apps
  annotations:
    # Use your Traefik ingress class or ingressClassName below
    kubernetes.io/ingress.class: "traefik"
    traefik.ingress.kubernetes.io/router.entrypoints: "web"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Optional: enable HSTS via Traefik headers middleware (if you want)
    # traefik.ingress.kubernetes.io/router.middlewares: "erp-site/hsts@kubernetescrd"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - erp.waldhauser.sk
      secretName: erp-waldhauser-cert   # <--- ensure this secret exists in the erp-site namespace (see notes)
  rules:
    - host: erp.waldhauser.sk
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: erp-site-svc
                port:
                  number: 80
